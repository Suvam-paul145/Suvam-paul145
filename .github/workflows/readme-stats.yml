name: Update README cards

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate README cards
        # Provide only the optional personal token explicitly; the runner already sets GITHUB_TOKEN
        # so avoid overwriting it with an empty secret value. Also expose the repository owner.
        # Enable top languages and streak generation so the cards follow fetched data.
        env:
          README_STATS_TOKEN: ${{ secrets.README_STATS_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GENERATE_TOP_LANGS: "1"
          GENERATE_STREAK: "1"
        run: python .github/scripts/render_readme_cards.py

      - name: Debug token presence
        env:
          README_STATS_TOKEN: ${{ secrets.README_STATS_TOKEN }}
        run: |
          echo "README_STATS_TOKEN: ${README_STATS_TOKEN:+present}"
          echo "GITHUB_TOKEN: ${GITHUB_TOKEN:+present}"

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Only add the specific SVGs we generate so other UI files are not changed
          git add profile/stats.svg
          if [ -f profile/top-langs.svg ]; then git add profile/top-langs.svg; fi
          if [ -f profile/streak.svg ]; then git add profile/streak.svg; fi

          git commit -m "Update README cards" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
